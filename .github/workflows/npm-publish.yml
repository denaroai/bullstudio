name: Publish npm packages

on:
  push:
    branches:
      - main
    paths:
      - ".changeset/**"
      - ".github/workflows/npm-publish.yml"
      - "apps/frontend/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: emirce/bullstudio

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck
        
      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Verify package contents
        run: pnpm pack:check

      - name: Create Version Packages PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Detect CLI release
        id: cli-release
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          node <<'NODE'
          const packages = JSON.parse(process.env.PUBLISHED_PACKAGES || "[]");
          const cli = packages.find((pkg) => pkg.name === "bullstudio");
          const fs = require("node:fs");

          if (!cli) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, "released=false\n");
            process.exit(0);
          }

          const [major, minor] = cli.version.split(".");
          const tags = [
            `${process.env.DOCKER_IMAGE_NAME}:${cli.version}`,
            `${process.env.DOCKER_IMAGE_NAME}:${major}.${minor}`,
            `${process.env.DOCKER_IMAGE_NAME}:${major}`,
            `${process.env.DOCKER_IMAGE_NAME}:latest`,
          ].join("\n");

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `released=true\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${cli.version}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tags<<EOF\n${tags}\nEOF\n`);
          NODE

      - name: Set up QEMU
        if: steps.cli-release.outputs.released == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.cli-release.outputs.released == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.cli-release.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.cli-release.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.cli-release.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Bullstudio
            org.opencontainers.image.description=Standalone Bullstudio dashboard
            org.opencontainers.image.source=https://github.com/emirce/bullstudio
            org.opencontainers.image.version=${{ steps.cli-release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
