name: Manual Docker image publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker version tag to publish, for example 1.4.1"
        required: true
      latest:
        description: "Also publish the latest tag"
        required: true
        default: true
        type: boolean

env:
  IMAGE_NAME: emirce/bullstudio

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        env:
          VERSION: ${{ inputs.version }}
          INCLUDE_LATEST: ${{ inputs.latest }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const version = process.env.VERSION;
          const [major, minor] = version.split(".");
          const tags = [
            `${process.env.IMAGE_NAME}:${version}`,
            `${process.env.IMAGE_NAME}:${major}.${minor}`,
            `${process.env.IMAGE_NAME}:${major}`,
          ];

          if (process.env.INCLUDE_LATEST === "true") {
            tags.push(`${process.env.IMAGE_NAME}:latest`);
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tags<<EOF\n${tags.join("\n")}\nEOF\n`);
          NODE

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Bullstudio
            org.opencontainers.image.description=Standalone Bullstudio dashboard
            org.opencontainers.image.source=https://github.com/emirce/bullstudio
            org.opencontainers.image.version=${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
