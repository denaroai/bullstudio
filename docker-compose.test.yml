services:
  redis:
    image: redis:7-alpine
    container_name: bullstudio-test-redis
    ports:
      - "${BULLSTUDIO_TEST_REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
